<!DOCTYPE html>
<html>
<head>

    <!-- Consent Mode - MUST COME BEFORE GTM -->
    <script>
      window.dataLayer = window.dataLayer || [];

      function gtag() {
        dataLayer.push(arguments);
      }

      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });

      const consent = localStorage.getItem('cookieConsent');

      if (consent === 'accepted') {
        gtag('consent', 'update', {
          analytics_storage: 'granted',
          ad_storage: 'granted',
          ad_user_data: 'granted',
          ad_personalization: 'granted'
        });
      }
    </script>

    <!-- Google Tag Manager -->
    <script>
      (function(w,d,s,l,i){
        w[l]=w[l]||[];
        w[l].push({
          'gtm.start': new Date().getTime(),
          event:'gtm.js'
        });

        var f=d.getElementsByTagName(s)[0],
            j=d.createElement(s),
            dl=l!='dataLayer'?'&l='+l:'';

        j.async=true;
        j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
        f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-NH54NL29');
    </script>
    <!-- End GTM -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

      body{
        margin:0;
        font-family:Arial, Helvetica, sans-serif;
      }

      .topnav{
        overflow:hidden;
        background:#333;
      }

      .topnav a{
        float:left;
        color:white;
        padding:14px 16px;
        text-decoration:none;
      }

      .topnav a:hover{
        background:#ddd;
        color:black;
      }

      .topnav a.active{
        background:#04AA6D;
      }

      .cookie-banner{
        position:fixed;
        bottom:20px;
        left:20px;
        right:20px;
        background:#222;
        color:white;
        padding:15px;
        border-radius:10px;
        display:none;
        justify-content:space-between;
        align-items:center;
        z-index:9999;
      }

      .cookie-banner button{
        margin-left:10px;
        padding:8px 15px;
        cursor:pointer;
      }

    </style>

    <title>Demo Site</title>

</head>

<body>

    <!-- GTM Noscript -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-NH54NL29"
        height="0"
        width="0"
        style="display:none;visibility:hidden">
      </iframe>
    </noscript>

    <!-- Cookie Banner -->
    <div id="cookie-banner" class="cookie-banner">
      <div>
        We use cookies to improve your experience and analyze website traffic.
      </div>

      <div>
        <button id="accept-cookies">Accept</button>
        <button id="reject-cookies">Reject</button>
      </div>
    </div>

    <!-- Website Content -->
    <div class="topnav">
      <a class="active" href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Contact</a>
      <a href="#">About</a>
    </div>

    <div style="padding:20px;">
      <h1>My Demo Site</h1>
      <p>This is a GTM Consent Mode demo website.</p>
    </div>

    <!-- Cookie Banner Logic -->
    <script>

      document.addEventListener("DOMContentLoaded", function () {

        const banner = document.getElementById("cookie-banner");
        const consent = localStorage.getItem("cookieConsent");

        if (!consent) {
          banner.style.display = "flex";
        }

        document.getElementById("accept-cookies")
          .addEventListener("click", function () {

            localStorage.setItem("cookieConsent", "accepted");

            gtag('consent', 'update', {
              analytics_storage: 'granted',
              ad_storage: 'granted',
              ad_user_data: 'granted',
              ad_personalization: 'granted'
            });

            dataLayer.push({
              event: "cookie_accepted"
            });

            banner.style.display = "none";
          });

        document.getElementById("reject-cookies")
          .addEventListener("click", function () {

            localStorage.setItem("cookieConsent", "rejected");

            gtag('consent', 'update', {
              analytics_storage: 'denied',
              ad_storage: 'denied',
              ad_user_data: 'denied',
              ad_personalization: 'denied'
            });

            dataLayer.push({
              event: "cookie_rejected"
            });

            banner.style.display = "none";
          });

      });

    </script>

</body>
</html>
